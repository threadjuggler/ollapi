services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ollapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REDACTED}
      POSTGRES_DB: ${POSTGRES_DB:-ollapi}
    ports:
      # Host port 5431 -> container 5432 (5431 chosen to avoid clashing with
      # other Postgres containers already running on this machine).
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ollapi} -d ${POSTGRES_DB:-ollapi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # Uncomment to use an NVIDIA GPU (requires the NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ollapi}:${POSTGRES_PASSWORD:-REDACTED}@db:5432/${POSTGRES_DB:-ollapi}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      AUTO_PULL_MODEL: ${AUTO_PULL_MODEL:-true}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
      

volumes:
  pgdata:
  ollama:
